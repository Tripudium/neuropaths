# Curved-domain smoke test for local iteration.
#
# Runs the full curved pipeline (random trig-polynomial boundaries +
# coordinate-transform PDE + f^{-1} as an extra input channel) on a
# handful of solutions so it finishes in a few minutes on a Mac.
# Numbers will not be meaningful -- this is for verifying the
# generator, dataset, FNO, and inference scripts handle the curved
# path correctly.

name: smoke_test_curved
output_dir: runs/smoke_test_curved

pde:
  fine_grid: 311
  coarse_grid: 32
  reynolds: 10.0
  char_length: 0.2
  viscosity: 1.0
  domain: curved
  boundary_n_max: 8
  boundary_eps: 0.1
  eps_1: 0.25       # epsilon-neighbourhood padding for turbulence
  eps_2: 0.25

data:
  num_train_solutions: 8
  num_test_solutions: 3
  train_csv: runs/smoke_test_curved/train.csv
  test_csv:  runs/smoke_test_curved/test.csv
  include_finv_column: true
  batch_size: 4
  num_workers: 0
  seed: 2203_2025
  rho_min_max: 0.0
  rho_min_l2:  0.0
  oversample_factor: 1.0

model:
  in_channels: 3        # (b1, b2, f^{-1}); neuralop adds (x, y) via grid embedding
  out_channels: 1
  modes: 12
  width: 32
  depth: 4
  projection_hidden: 64
  activation: gelu
  domain_padding: [0.125, 0.0]

train:
  epochs: 3
  lr: 0.001
  weight_decay: 0.0
  loss: h1
  loss_eps: 0.0
  scheduler: cosine
  checkpoint_path: runs/smoke_test_curved/fno2d.pth
  device: auto
  deterministic: false

eval:
  checkpoint_path: runs/smoke_test_curved/fno2d.pth
  output_dir: runs/smoke_test_curved/eval
  test_resolutions: [16, 32]
  num_plot_samples: 2
