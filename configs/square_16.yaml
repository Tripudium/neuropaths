# Square-domain low-resolution run (s = 16) for the resolution-invariance
# sweep in Table 1 (dissertation Section 5.1).

name: square_16
output_dir: runs/square_16

pde:
  fine_grid: 311
  coarse_grid: 16
  reynolds: 10.0
  char_length: 0.2
  viscosity: 1.0
  domain: square
  eps_1: 0.0
  eps_2: 0.0

data:
  num_train_solutions: 1000
  num_test_solutions: 200
  train_csv: runs/square_16/train.csv
  test_csv:  runs/square_16/test.csv
  include_finv_column: false
  batch_size: 32
  num_workers: 0
  seed: 2203_2025

model:
  in_channels: 4
  out_channels: 1
  modes: 12
  width: 128
  depth: 4
  projection_hidden: 128
  activation: gelu

train:
  epochs: 100
  lr: 0.001
  loss: relative_l2
  scheduler: none
  checkpoint_path: runs/square_16/fno2d.pth
  device: auto

eval:
  checkpoint_path: runs/square_16/fno2d.pth
  output_dir: runs/square_16/eval
  test_resolutions: [16, 32, 63]
  num_plot_samples: 3
